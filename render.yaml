services:
  - type: web
    name: ai-api-platform-backend
    runtime: python
    rootDir: backend
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disks:
      - name: ai-platform-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: ALLOW_MOCK_PROVIDERS
        value: false
      - key: ALLOW_MOCK_SUBSCRIPTIONS
        value: false
      - key: DATABASE_URL
        value: sqlite:////var/data/ai_platform.db
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: FLUX_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        value: https://api.anthropic.com/v1
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: KLING_API_KEY
        sync: false
      - key: RUNWAY_API_KEY
        sync: false
      - key: VEO_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
